    <h1>WAAKYE</h1>

    <P><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Waakye_with_vegetables%2C_fish_and_egg_with_ripe_plantains.jpg/250px-Waakye_with_vegetables%2C_fish_and_egg_with_ripe_plantains.jpg" alt="picture of waakye" height="300" width="300" > </P>
    <p>Waakye is a Ghanaian dish of cooked rice and beans, commonly eaten for breakfast or lunch. Rice and beans, usually black eyed peas or cow beans, are cooked together, along with red dried sorghum leaf sheaths or stalks and kaun.</p>
